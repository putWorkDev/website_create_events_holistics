services:
  postgres:
    image: postgres:16
    container_name: holistics-events-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: holistics_events
      POSTGRES_USER: holistics
      POSTGRES_PASSWORD: holistics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U holistics -d holistics_events"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
